name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
        eslint-version: ['8', '9', '10']
    name: Node ${{ matrix.node-version }} / ESLint ${{ matrix.eslint-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Override ESLint version
        run: npm install --no-save eslint@${{ matrix.eslint-version }}

      - name: Build
        run: npm run build

      - name: Run tests
        run: npx vitest run

